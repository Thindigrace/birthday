<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>welcome</title>
    <style>
        
/* navbar section */
.navbar{
    background-color: #ff696b;
    padding: 15px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}
.navbar a {
    color:white ;
    padding:8px 15px ;
    margin:0 15px ;
    text-decoration:none ;
    font-size: 24px;
    border-radius:8px ;
    transition:background 0.3s,transform 0.2s;
}
.navbar a:hover{
    background-color: #ff1493;
    transform: scale(1.1);
} 
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(#ffd6ec,#ffffff);
            text-align: center;
            overflow: hidden;
        }
        h1{
            margin-top: 50px;
            color: #ff1493;
        }
        .memoriesBtn{
               display: inline-block; 
               margin-top: 30px;
               padding: 12px 25px;
               background: #ff69b4;
               color: white;
               text-decoration: none;
               border-radius: 10px;
               font-size: 18px;
            }
        #cake{
            width: 300px;
            cursor: pointer;
            margin-top: 30px;
            transition: filter 0.5s;
        }
        #message{
            font-size: 24px;
            margin-top: 20px;
            color: #ff1493;
            font-weight: bold;
        }
        .runningage{
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation-name: fly;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
        }
        @keyframes fly{
            0%{ transform: translate(0,0);}
            25%{ transform:translate(80vw,0) ;}
            50%{ transform: translate(80vw,80vh);}
            75%{ transform: translate(0,80vh);}
            100%{ transform: translate(0,0);}
        }
        .confetti{ 
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: fall linear infinite;
        }
        @keyframes fall{
            0%{transform: translateY(-100vh);
            opacity: 1;}
            100%{ transform: translateY(100vh);
            opacity: 0;
        }
        }
       
        
        
footer{
    background-color: #ff694b;
    color: white;
    padding: 15px;
    margin-top: 40px;
    font-size: 16px;
    text-align: center;
    position: fixed;
    bottom: 0;
    width: 100%;
}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="memories.html">memories</a>
        <a href="welcomepage.html">welcomepage</a>
        <a href="birthdaymessage.html">birthdaymessage</a>
        <!-- <a href=""></a> -->
    </nav>
<h1>make a wish and hover on the cake</h1>
<img id="keik" src="static/keik.webp" alt="birthday keik">
<div id="message"></div>
<a href="memories.html" class="memoriesBtn">see some amazin memories
</a>
<script>
const keik = document.getElementById("keik");
const message = document.getElementById("message");
const age = 23;
keik.addEventListener("click",() => {
    keik.style.filter = "brightness(20%)";
    message.innerHTML = "happy birthday ! you are now " + age + "";
    //run mess
    const messageCount = 21;
    for (let i =0;i<messageCount;i++){
        const run = document.createElement("div");
        run.classList.add("runningage");
        run.innerText ="happy birthday!!!! you are now" + age ;
        run.style.top = Math.random()*90 + "vh";
        run .style.left = Math.random()*100 + "vw";
        run.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(run);
    }
    //confetti
    const confettiCount = 80;
    for (let i =0;i<confettiCount;i++){;
    const conf = document.createElement("div");
    conf.classList.add("confetti");
    conf.style.left = Math.random()*100+"vw";
    conf.style.background = `hsl(${Math.random()*360},100%,50%)`;
    conf.style.animationDuration = (2 + Math.random()*3) + "s";
    document.body.appendChild(conf);
    }
});

    

</script>
<footer class="footer">
        <p>&copy;2026 grace thindi.All rights reserved. </p>
    </footer>
    
</body>
</html>
